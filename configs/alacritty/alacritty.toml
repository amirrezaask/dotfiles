[general]
# =============================================================================
# THEME
# =============================================================================
import = ["~/.config/alacritty/themes/themes/tokyo_night.toml"]

# =============================================================================
# WINDOW DECORATIONS & LAYOUT
# =============================================================================
[window.padding]
x = 8
y = 8

# =============================================================================
# FONT
# =============================================================================
[font]
size = 15.0

[font.normal]
family = "Fira Code"

# =============================================================================
# CURSOR
# =============================================================================
[cursor.style]
shape = "Beam"
blinking = "Off"

[cursor]
unfocused_hollow = true

# =============================================================================
# TMUX KEYBINDINGS
# Send Ctrl+B (\u0002) prefix sequences to tmux using the Command key
# =============================================================================
[[keyboard.bindings]]
key = "Key1"
mods = "Command"
chars = "\u00021"

[[keyboard.bindings]]
key = "Key2"
mods = "Command"
chars = "\u00022"

[[keyboard.bindings]]
key = "Key3"
mods = "Command"
chars = "\u00023"

