# =============================================================================
# THEME
# =============================================================================
include themes/tokyo_night_night.conf

# =============================================================================
# FONT
# =============================================================================
font_family Fira Code
font_size 15

# =============================================================================
# WINDOW DECORATIONS & LAYOUT
# =============================================================================
hide_window_decorations titlebar-only
window_padding_width 4
window_margin_width 2
draw_minimal_borders yes
inactive_text_alpha 0.75

# =============================================================================
# CURSOR
# =============================================================================
cursor_shape beam
cursor_shape_unfocused hollow

# 0 = no blink
cursor_blink_interval 0
cursor_stop_blinking_after 0

cursor_trail 40
cursor_trail_decay 0.05 0.20
cursor_trail_start_threshold 2
# Suggestion: "none" falls back to cursor text color. Set an explicit hex color
# like #c0caf5 (a soft blue) if you want a specific trail hue.
cursor_trail_color #c0caf5

# =============================================================================
# SHELL INTEGRATION
# =============================================================================
shell_integration no

# =============================================================================
# TAB BAR
# =============================================================================
tab_bar_style fade
tab_bar_edge top
tab_bar_align center
tab_title_max_length 40

# =============================================================================
# SCROLLBAR
# =============================================================================
scrollbar hovered
# Suggestion: 0.6 width may render inconsistently (sub-pixel). Consider 1 or 2.
scrollbar_width 2
scrollbar_handle_opacity 0.35
scrollbar_track_opacity 0.0

# =============================================================================
# PERFORMANCE
# =============================================================================
repaint_delay 10
input_delay 3

# =============================================================================
# TMUX KEYBINDINGS — send Ctrl+B prefix sequences to tmux
# These translate Cmd+<key> into \x01<key> (where \x01 = Ctrl+A remapped prefix
# in tmux). This lets you use Cmd instead of Ctrl+B for tmux commands.
# =============================================================================
map cmd+1 send_text all \x021
map cmd+2 send_text all \x022
map cmd+3 send_text all \x023
map cmd+4 send_text all \x024
map cmd+5 send_text all \x025
map cmd+6 send_text all \x026
map cmd+7 send_text all \x027
map cmd+8 send_text all \x028
map cmd+9 send_text all \x029
map cmd+j send_text all \x02j
map cmd+k send_text all \x02k
map cmd+l send_text all \x02l
map cmd+o send_text all \x02a
map cmd+p send_text all \x02a
map cmd+r send_text all \x02r
map cmd+t send_text all \x02c
map cmd+t send_text all \x02c
map cmd+w send_text all \x02x
map cmd+d send_text all \x02|
map cmd+shift+d send_text all \x02-
map shift+enter send_text all \x1b[13;2u
