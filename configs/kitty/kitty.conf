include themes/tokyo_night_night.conf

font_family Fira Code
font_size 15

background_opacity 0.90
dynamic_background_opacity yes
background_blur 50

hide_window_decorations titlebar-only
window_padding_width 0
window_margin_width 0
draw_minimal_borders yes
inactive_text_alpha 0.85

cursor_shape beam
cursor_shape_unfocused hollow

cursor_blink_interval 0
cursor_stop_blinking_after 0

# Uncomment for cursor trail animations
cursor_trail 40
cursor_trail_decay 0.05 0.20
cursor_trail_start_threshold 2
cursor_trail_color none

shell_integration no-cursor

tab_bar_style fade
tab_bar_edge top
tab_bar_align center
tab_title_max_length 40

scrollbar hovered
scrollbar_width 0.6
scrollbar_handle_opacity 0.35
scrollbar_track_opacity 0.0

repaint_delay 10
input_delay 3

# confirm_os_window_close 0

allow_remote_control yes
listen_on unix:/tmp/kitty-${USER}.sock

# enabled_layouts splits,stack,tall,grid,vertical,horizontal


# These below work for tmux.
map cmd+1 send_text all \x011
map cmd+2 send_text all \x012
map cmd+3 send_text all \x013
map cmd+4 send_text all \x014
map cmd+5 send_text all \x015
map cmd+6 send_text all \x016
map cmd+7 send_text all \x017
map cmd+8 send_text all \x018
map cmd+9 send_text all \x019
map cmd+j send_text all \x01j
map cmd+k send_text all \x01k
map cmd+l send_text all \x01l
map cmd+o send_text all \x01a

map cmd+t no_op

