# =============================================================================
# THEME
# =============================================================================
include themes/Catppuccin-Mocha.conf

# =============================================================================
# FONT
# =============================================================================
font_family Jetbrains Mono
font_size 14

# =============================================================================
# WINDOW DECORATIONS & LAYOUT
# =============================================================================
hide_window_decorations titlebar-only
window_padding_width 4
window_margin_width 2
draw_minimal_borders yes
inactive_text_alpha 0.75
background_image end_4.png
background_tint 0.8
background_image_layout cscaled


# =============================================================================
# CURSOR
# =============================================================================
cursor_shape beam
cursor_shape_unfocused hollow

# 0 = no blink
cursor_blink_interval 0
cursor_stop_blinking_after 0


# Set to a non 0 integer to activate cursor trails
cursor_trail 1
cursor_trail_decay 0.05 0.2
cursor_trail_start_threshold 0

# =============================================================================
# SHELL INTEGRATION
# =============================================================================
shell_integration yes
allow_remote_control yes

# =============================================================================
# TAB BAR
# =============================================================================

# This will actually disable the tab bar
# tab_bar_min_tabs 2

tab_bar_edge top
tab_bar_align center
tab_bar_background none
tab_bar_style separator
tab_separator ""

# Inactive tab template using terminal colors from the active theme.
tab_title_template "{fmt.fg.color8}{fmt.bg.default}{fmt.fg.color15}{fmt.bg.color8} ({index}) {title} {fmt.fg.color8}{fmt.bg.default} "

# Active tab template using terminal colors from the active theme.
active_tab_title_template "{fmt.fg.color13}{fmt.bg.default}{fmt.fg.color16}{fmt.bg.color13} ({index}) {title} {fmt.fg.color13}{fmt.bg.default} "
active_tab_font_style bold

#
# tab_bar_style separator
# tab_separator ""
# tab_bar_min_tabs 2
# tab_title_template "{fmt.fg._5c6370}{fmt.bg._11111b}{fmt.fg._cdd6f4}{fmt.bg._5c6370} ({index}) {title} {fmt.fg._5c6370}{fmt.bg._11111b} "
# active_tab_title_template "{fmt.fg._BAA0E8}{fmt.bg._11111b}{fmt.fg._1e1e2e}{fmt.bg._BAA0E8} ({index}) {title} {fmt.fg._BAA0E8}{fmt.bg._11111b} "
# active_tab_font_style bold


# =============================================================================
# SCROLLBAR
# =============================================================================
scrollbar hovered
scrollbar_width 2
scrollbar_handle_opacity 0.35
scrollbar_track_opacity 0.0

# =============================================================================
# PERFORMANCE
# =============================================================================
repaint_delay 10
input_delay 3

# =============================================================================
# TMUX KEYBINDINGS — send Ctrl+B prefix sequences to tmux
# These translate Cmd+<key> into \x01<key> (where \x01 = Ctrl+A remapped prefix
# in tmux). This lets you use Cmd instead of Ctrl+B for tmux commands.
# =============================================================================
# shell tmux new-session -A -s "scratch"
# map cmd+1 send_text all \x011
# map cmd+2 send_text all \x012
# map cmd+3 send_text all \x013
# map cmd+4 send_text all \x014
# map cmd+5 send_text all \x015
# map cmd+6 send_text all \x016
# map cmd+7 send_text all \x017
# map cmd+8 send_text all \x018
# map cmd+9 send_text all \x019
# map cmd+o send_text all \x01a
# map cmd+p send_text all \x01a
# map cmd+r send_text all \x01r
# map cmd+t send_text all \x01c
# map cmd+t send_text all \x01c
# map cmd+w send_text all \x01x
# map cmd+d send_text all \x01|
# map cmd+n no_op
# map cmd+shift+d send_text all \x02-
# map shift+enter send_text all \x1b[13;2u

# =============================================================================
# KITTY SESSION KEYBINDINGS
# =============================================================================
map cmd+p launch --type overlay --allow-remote-control zsh -l ~/.config/kitty/scripts/session-picker-tabs.sh
enabled_layouts splits,stack
map cmd+enter next_layout
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+t new_tab_with_cwd
map cmd+d launch --cwd=current --location=vsplit
map cmd+shift+d launch --cwd=current --location=hsplit
map cmd+w close_window
map cmd+n new_os_window_with_cwd
map cmd+r set_tab_title

map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right
map cmd+left neighboring_window left
map cmd+down neighboring_window down
map cmd+up neighboring_window up
map cmd+right neighboring_window right
map --when-focus-on var:IS_VIM=true ctrl+h
map --when-focus-on var:IS_VIM=true ctrl+j
map --when-focus-on var:IS_VIM=true ctrl+k
map --when-focus-on var:IS_VIM=true ctrl+l
