# =============================================================================
# THEME
# =============================================================================
include themes/tokyo_night_night.conf

# =============================================================================
# FONT
# =============================================================================
font_family Fira Code
font_size 15

# =============================================================================
# TRANSPARENCY & BLUR
# =============================================================================
background_opacity 0.92
background_blur 70

# =============================================================================
# WINDOW DECORATIONS & LAYOUT
# =============================================================================
hide_window_decorations titlebar-only
window_padding_width 4
window_margin_width 2
draw_minimal_borders yes
inactive_text_alpha 0.75

# =============================================================================
# CURSOR
# =============================================================================
cursor_shape beam
cursor_shape_unfocused hollow

# 0 = no blink
cursor_blink_interval 0
cursor_stop_blinking_after 0

cursor_trail 40
cursor_trail_decay 0.05 0.20
cursor_trail_start_threshold 2
# Suggestion: "none" falls back to cursor text color. Set an explicit hex color
# like #c0caf5 (a soft blue) if you want a specific trail hue.
cursor_trail_color #c0caf5

# =============================================================================
# SHELL INTEGRATION
# =============================================================================
shell_integration no

# =============================================================================
# TAB BAR
# =============================================================================
tab_bar_style fade
tab_bar_edge top
tab_bar_align center
tab_title_max_length 40

# =============================================================================
# SCROLLBAR
# =============================================================================
scrollbar hovered
# Suggestion: 0.6 width may render inconsistently (sub-pixel). Consider 1 or 2.
scrollbar_width 2
scrollbar_handle_opacity 0.35
scrollbar_track_opacity 0.0

# =============================================================================
# PERFORMANCE
# =============================================================================
repaint_delay 10
input_delay 3


# =============================================================================
# REMOTE CONTROL (for external tools to talk to kitty)
# =============================================================================
allow_remote_control yes
listen_on unix:/tmp/kitty-${USER}.sock

# =============================================================================
# TMUX KEYBINDINGS — send Ctrl+A prefix sequences to tmux
# These translate Cmd+<key> into \x01<key> (where \x01 = Ctrl+A remapped prefix
# in tmux). This lets you use Cmd instead of Ctrl+B for tmux commands.
# =============================================================================
map cmd+1 send_text all \x011
map cmd+2 send_text all \x012
map cmd+3 send_text all \x013
map cmd+4 send_text all \x014
map cmd+5 send_text all \x015
map cmd+6 send_text all \x016
map cmd+7 send_text all \x017
map cmd+8 send_text all \x018
map cmd+9 send_text all \x019
map cmd+j send_text all \x01j
map cmd+k send_text all \x01k
map cmd+l send_text all \x01l
map cmd+o send_text all \x01a
map cmd+p send_text all \x01a
map cmd+r send_text all \x01r
map shift+enter send_text all \x1b[13;2u

