# =============================================================================
# THEME
# =============================================================================
include themes/tokyo_night_night.conf

# =============================================================================
# FONT
# =============================================================================
font_family Jetbrains Mono
font_size 18

# =============================================================================
# WINDOW DECORATIONS & LAYOUT
# =============================================================================
hide_window_decorations titlebar-only
window_padding_width 4
window_margin_width 2
draw_minimal_borders yes
inactive_text_alpha 0.75
# background_image end_4.png
background_tint 0.7
background_image_layout cscaled

# =============================================================================
# CURSOR
# =============================================================================
cursor_shape beam
cursor_shape_unfocused hollow

# 0 = no blink
cursor_blink_interval 0
cursor_stop_blinking_after 0


# Set to a non 0 integer to activate cursor trails
cursor_trail 1
cursor_trail_decay 0.01 0.5
cursor_trail_start_threshold 0

# =============================================================================
# SHELL INTEGRATION
# =============================================================================
shell_integration yes
allow_remote_control yes

# =============================================================================
# TAB BAR
# =============================================================================
# This will actually disable the tab bar
tab_bar_min_tabs 10000 
# tab_bar_edge top
# tab_bar_align left
# tab_title_max_length 40
# tab_bar_style separator
# tab_separator "  "
# tab_title_template "({index}) {title} "
# active_tab_title_template "({index}) {title} "
# active_tab_font_style bold

# =============================================================================
# SCROLLBAR
# =============================================================================
scrollbar hovered
# Suggestion: 0.6 width may render inconsistently (sub-pixel). Consider 1 or 2.
scrollbar_width 2
scrollbar_handle_opacity 0.35
scrollbar_track_opacity 0.0

# =============================================================================
# PERFORMANCE
# =============================================================================
repaint_delay 10
input_delay 3

# =============================================================================
# TMUX KEYBINDINGS — send Ctrl+B prefix sequences to tmux
# These translate Cmd+<key> into \x01<key> (where \x01 = Ctrl+A remapped prefix
# in tmux). This lets you use Cmd instead of Ctrl+B for tmux commands.
# =============================================================================
# shell tmux new-session -A -s "scratch"
# map cmd+1 send_text all \x011
# map cmd+2 send_text all \x012
# map cmd+3 send_text all \x013
# map cmd+4 send_text all \x014
# map cmd+5 send_text all \x015
# map cmd+6 send_text all \x016
# map cmd+7 send_text all \x017
# map cmd+8 send_text all \x018
# map cmd+9 send_text all \x019
# map cmd+o send_text all \x01a
# map cmd+p send_text all \x01a
# map cmd+r send_text all \x01r
# map cmd+t send_text all \x01c
# map cmd+t send_text all \x01c
# map cmd+w send_text all \x01x
# map cmd+d send_text all \x01|
# map cmd+n no_op
# map cmd+shift+d send_text all \x02-
# map shift+enter send_text all \x1b[13;2u

# =============================================================================
# KITTY SESSION KEYBINDINGS
# =============================================================================
map cmd+p launch --type overlay --allow-remote-control zsh -l ~/.config/kitty/scripts/session-picker-tabs.sh
enabled_layouts splits
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+t new_tab_with_cwd
map cmd+d launch --cwd=current --location=vsplit
map cmd+shift+d launch --cwd=current --location=hsplit
map cmd+w close_window
map cmd+n new_os_window_with_cwd
