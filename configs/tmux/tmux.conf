unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g status-position top
set -g status-style 'bg=default fg=#5eacd3'
set -g status-left-length 50
set -g status-left '#S '
set -g status-justify centre
set -g status-right '%a %d %b %H:%M '

set -g base-index 1
set -g mouse on
set -g escape-time 0
set -g renumber-windows on

# Enable extended keys
set -s extended-keys on
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Copy stuff
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

set -g default-terminal "tmux-256color"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"


# I don't care about the ease of these since I remap them in the terminal.
bind j select-window -t 1
bind k select-window -t 2
bind l select-window -t 3

# Reload configuration
bind r source ~/.config/tmux/tmux.conf

# Most important part of the tmux.
bind a display-popup -E -w 60% -h 60% "~/.config/tmux/session-picker.sh"
 



